version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8080
    # Fix: Give the container access to Google's public DNS so it can
    # resolve external hostnames like db.xxxxx.supabase.co
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
